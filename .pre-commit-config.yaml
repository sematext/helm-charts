repos:
  # YAML formatting — catches indentation issues like the batch apiGroup bug
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args: [--unsafe]  # --unsafe needed for Helm templates with {{ }}
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: "charts/.*/templates/.*\\.yaml$"  # helm templates may be intentionally empty-terminated

  # yamllint — enforces consistent indentation across all YAML
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]
        exclude: "charts/.*/templates/.*\\.yaml$"  # helm templates use {{ }} which yamllint can't parse

  # helm lint — requires `ct` and `helm` to be installed locally
  - repo: local
    hooks:
      - id: ct-lint
        name: ct lint
        language: system
        entry: ct lint --config ct.yaml
        pass_filenames: false
        files: "charts/"
