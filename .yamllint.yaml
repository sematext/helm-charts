extends: default

rules:
  # Enforce 2-space indentation everywhere
  indentation:
    spaces: 2
    indent-sequences: false  # list items under a key aren't double-indented
    check-multi-line-strings: false

  line-length:
    max: 150
    level: warning

  # Allow multiple blank lines in values.yaml for readability
  empty-lines:
    max: 2

  # Don't require document start (---)
  document-start: disable

  # Allow truthy values like `true`/`false` without quoting
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
