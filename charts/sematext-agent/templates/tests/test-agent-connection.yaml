apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "sematext-agent.fullname" . }}-test-connection"
  labels:
    app: {{ template "sematext-agent.name" . }}
    chart: {{ template "sematext-agent.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
  - name: wget
    image: busybox
    command: ['wget']
    args:
    - --spider
    - --timeout=5
    - "http://{{ include "sematext-agent.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.agent.service.port }}/"
  restartPolicy: Never
