name: Chart Testing

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-yamllint-1.35.1

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Lint non-template YAML files
        # Excludes Helm templates (they contain {{ }} which isn't valid YAML)
        run: |
          yamllint -c .yamllint.yaml \
            ct.yaml \
            .pre-commit-config.yaml \
            charts/sematext-agent/values.yaml \
            charts/sematext-agent/ci/*.yaml

  lint-test:
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Helm binary
        uses: actions/cache@v4
        with:
          path: ~/.local/share/helm
          key: helm-v3.14.0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.10.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        # ct install runs `helm install` + `helm test` for each ci/ values file
        run: ct install --config ct.yaml
